version: 1
disable_existing_loggers: False
formatters:
  default:
    '()': uvicorn.logging.DefaultFormatter
    format: '%(levelprefix)s [%(asctime)s] uvicorn.log -- %(message)s'
    use_colors: null
    datefmt: '%d-%m-%Y %H:%M:%S'
  app_default:
    '()': uvicorn.logging.DefaultFormatter
    format: '%(levelprefix)s [%(asctime)s] %(name)s -- %(message)s'
    use_colors: null
    datefmt: '%d-%m-%Y %H:%M:%S'
  access:
    '()': uvicorn.logging.AccessFormatter
    format: '%(levelprefix)s [%(asctime)s] %(name)s %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: '%d-%m-%Y %H:%M:%S'
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
  app_handler:
    formatter: app_default
    class: logging.StreamHandler
    stream: ext://sys.stderr
loggers:
  uvicorn:
    level: INFO
    handlers:
      - default
    propagate: no
  uvicorn.error:
    level: INFO
  uvicorn.access:
    level: INFO
    handlers:
      - access
    propagate: no
  app:
    level: INFO
    handlers:
      - app_handler
    propagate: no
