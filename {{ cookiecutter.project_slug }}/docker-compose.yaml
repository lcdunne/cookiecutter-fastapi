services:
  app:
    build:
      context: .
    ports:
      - 8000:8000
    env_file:
      - .env
{% if cookiecutter.database == "postgresql" %}
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/{{ cookiecutter.project_slug }}"
    depends_on:
      - db
{% endif %}
    restart: unless-stopped
{% if cookiecutter.database == "postgresql" %}
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: {{ cookiecutter.project_slug }}
    ports:
      - 5432:5432
    volumes:
      - {{ cookiecutter.project_slug }}_data:/var/lib/postgresql/18/docker
    command: ["postgres", "-c", "timezone=UTC"]

volumes:
  {{ cookiecutter.project_slug }}_data:
{% endif %}
